server:
  port: 8080

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8089/realms/omnitrade

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/users,/api/v1/users/**

            - id: item-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/items,/api/v1/items/**

            - id: offer-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/v1/offers,/api/v1/offers/**

management:
  endpoints:
    web:
      exposure:
        include: "*"

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.boot.autoconfigure: INFO